<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <title>MovieHub</title> <style> body{ margin:0; font-family:Arial, Helvetica, sans-serif; background:#141414; color:white; } /* Center container width */ .wrapper{ max-width:1100px; margin:auto; } /* Header */ header{ background:black; } .header-content{ max-width:1100px; margin:auto; display:flex; justify-content:space-between; align-items:center; padding:15px; } /* Logo */ .logo{ font-size:30px; font-weight:bold; color:red; letter-spacing:2px; } /* Search box */ #search{ padding:8px; width:220px; border-radius:5px; border:none; } /* Container */ .container{ padding:30px 10px; text-align:center; } /* Movie grid */ .movie-row{ display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:20px; } /* Movie card */ .movie{ width:180px; transition:transform 0.3s; } .movie img{ width:100%; border-radius:6px; } .movie:hover{ transform:scale(1.1); } .movie-title{ margin-top:8px; } a{ text-decoration:none; color:white; } </style> </head> <body> <header> <div class="header-content"> <div class="logo">MKV.RJ</div> <input type="text" id="search" placeholder="Search movies..." onkeyup="searchMovies()"> </div> </header> <div class="wrapper"> 
    <div class="container"> <h2>Popular Movies</h2> 
    <div class="movie-row" id="movieList"> 
        <a href="https://gplinks.co/ez60uKL" class="movie"> <img src="animal.jpg"> <div class="movie-title">Animal</div> </a> 
        <a href="https://gplinks.co/iGx5K" class="movie"> <img src="3bhk.jpg"> <div class="movie-title">3BHK</div> </a> 
 </div> </div> </div> <script> function searchMovies(){ let input = document.getElementById("search").value.toLowerCase(); let movies = document.querySelectorAll(".movie"); movies.forEach(function(movie){ let title = movie.innerText.toLowerCase(); if(title.includes(input)) { movie.style.display="block"; } else { movie.style.display="none"; } }); } </script> </body> </html>
